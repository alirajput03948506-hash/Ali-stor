<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI Super Store - Shop Now</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="top-bar">
            <div class="logo">
                <h1>ALI <span>Super Store</span></h1>
            </div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search for products...">
                <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="products.html">Shop</a>
                <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)</a>
                <a href="login.html">Login</a>
                <a href="profile.html"><i class="fas fa-user"></i></a>
            </nav>
        </div>
    </header>

    <!-- Slider -->
    <div class="hero-slider">
        <div class="slide active">
            <img src="assets/banners/banner1.jpg" alt="Banner">
            <div class="slide-content">
                <h2>Big Summer Sale</h2>
                <p>Up to 70% off on electronics</p>
                <button onclick="window.location.href='products.html'">Shop Now</button>
            </div>
        </div>
        <!-- More slides -->
    </div>

    <!-- Categories -->
    <section class="categories">
        <h2>Shop by Category</h2>
        <div class="category-grid">
            <!-- Categories -->
        </div>
    </section>

    <!-- Featured Products -->
    <section class="featured">
        <h2>Featured Products</h2>
        <div class="product-grid" id="featured-products">
            <!-- JS populated -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 ALI Super Store. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
